services:
  # ── Databases ──────────────────────────────────────────
  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Services ───────────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    environment:
      DB_URL: postgres://postgres:postgres@user-db:5432/user_db?sslmode=disable
      GRPC_PORT: 50051
      JWT_SECRET: supersecretkey
    ports:
      - "50051:50051"
    depends_on:
      user-db:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    environment:
      DB_URL: postgres://postgres:postgres@product-db:5432/product_db?sslmode=disable
      GRPC_PORT: 50052
    ports:
      - "50052:50052"
    depends_on:
      product-db:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    environment:
      DB_URL: postgres://postgres:postgres@order-db:5432/order_db?sslmode=disable
      GRPC_PORT: 50053
      PRODUCT_SERVICE_ADDR: product-service:50052
    ports:
      - "50053:50053"
    depends_on:
      order-db:
        condition: service_healthy
      product-service:
        condition: service_started

  # ── API Gateway ────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      HTTP_PORT: 8080
      USER_SERVICE_ADDR: user-service:50051
      PRODUCT_SERVICE_ADDR: product-service:50052
      ORDER_SERVICE_ADDR: order-service:50053
      JWT_SECRET: supersecretkey
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - product-service
      - order-service

  # ── Load Balancer ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - gateway

volumes:
  user-db-data:
  product-db-data:
  order-db-data: