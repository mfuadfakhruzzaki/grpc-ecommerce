syntax = "proto3";

package user.v1;

option go_package = "github.com/mfuadfakhruzzaki/grpc-ecommerce/proto/user/v1;userv1";

import "google/api/annotations.proto";

service UserService {
  rpc RegisterUser(RegisterUserReq) returns (RegisterUserRes) {
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  }
  rpc LoginUser(LoginUserReq) returns (LoginUserRes) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }
  rpc GetProfile(GetProfileReq) returns (GetProfileRes) {
    option (google.api.http) = {
      get: "/v1/users/me"
    };
  }
  rpc UpdateProfile(UpdateProfileReq) returns (UpdateProfileRes) {
    option (google.api.http) = {
      patch: "/v1/users/me"
      body: "*"
    };
  }
}

message RegisterUserReq {
  string email = 1;
  string password = 2;
  string full_name = 3;
}
message RegisterUserRes {
  string id = 1;
  string email = 2;
  string full_name = 3;
}

message LoginUserReq {
  string email = 1;
  string password = 2;
}
message LoginUserRes {
  string access_token = 1;
  string token_type = 2;
}

message GetProfileReq {}
message GetProfileRes {
  string id = 1;
  string email = 2;
  string full_name = 3;
  string avatar_url = 4;
}

message UpdateProfileReq {
  string full_name = 1;
  string avatar_url = 2;
}
message UpdateProfileRes {
  string id = 1;
  string full_name = 2;
  string avatar_url = 3;
}