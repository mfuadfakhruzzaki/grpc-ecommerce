syntax = "proto3";

package product.v1;

option go_package = "github.com/mfuadfakhruzzaki/grpc-ecommerce/proto/product/v1;productv1";

import "google/api/annotations.proto";

service ProductService {
  rpc ListProducts(ListProductsReq) returns (ListProductsRes) {
    option (google.api.http) = { get: "/v1/products" };
  }
  rpc GetProduct(GetProductReq) returns (GetProductRes) {
    option (google.api.http) = { get: "/v1/products/{id}" };
  }
  rpc CreateProduct(CreateProductReq) returns (CreateProductRes) {
    option (google.api.http) = { post: "/v1/products" body: "*" };
  }
  rpc UpdateProduct(UpdateProductReq) returns (UpdateProductRes) {
    option (google.api.http) = { patch: "/v1/products/{id}" body: "*" };
  }
  rpc DeleteProduct(DeleteProductReq) returns (DeleteProductRes) {
    option (google.api.http) = { delete: "/v1/products/{id}" };
  }
  rpc CheckStock(CheckStockReq) returns (CheckStockRes) {}
  rpc DeductStock(DeductStockReq) returns (DeductStockRes) {}
}

message ListProductsReq {
  int32 page = 1;
  int32 limit = 2;
  string category_id = 3;
}
message ListProductsRes {
  repeated Product products = 1;
  int32 total = 2;
}

message GetProductReq { string id = 1; }
message GetProductRes { Product product = 1; }

message CreateProductReq {
  string name = 1;
  string description = 2;
  double price = 3;
  string category_id = 4;
  int32 stock_qty = 5;
}
message CreateProductRes { Product product = 1; }

message UpdateProductReq {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int32 stock_qty = 5;
}
message UpdateProductRes { Product product = 1; }

message DeleteProductReq { string id = 1; }
message DeleteProductRes { bool success = 1; }

message CheckStockReq { string product_id = 1; int32 quantity = 2; }
message CheckStockRes { bool available = 1; int32 current_stock = 2; }

message DeductStockReq { string product_id = 1; int32 quantity = 2; }
message DeductStockRes { bool success = 1; int32 remaining_stock = 2; }

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  string category_id = 5;
  int32 stock_qty = 6;
  bool is_active = 7;
}