syntax = "proto3";

package order.v1;

option go_package = "github.com/mfuadfakhruzzaki/grpc-ecommerce/proto/order/v1;orderv1";

import "google/api/annotations.proto";

service OrderService {
  rpc CreateOrder(CreateOrderReq) returns (CreateOrderRes) {
    option (google.api.http) = { post: "/v1/orders" body: "*" };
  }
  rpc GetOrder(GetOrderReq) returns (GetOrderRes) {
    option (google.api.http) = { get: "/v1/orders/{id}" };
  }
  rpc ListOrders(ListOrdersReq) returns (ListOrdersRes) {
    option (google.api.http) = { get: "/v1/orders" };
  }
  rpc UpdateOrderStatus(UpdateStatusReq) returns (UpdateStatusRes) {
    option (google.api.http) = { patch: "/v1/orders/{id}/status" body: "*" };
  }
}

message OrderItem {
  string product_id = 1;
  int32 quantity = 2;
}
message CreateOrderReq { repeated OrderItem items = 1; }
message CreateOrderRes { Order order = 1; }

message GetOrderReq { string id = 1; }
message GetOrderRes { Order order = 1; }

message ListOrdersReq { int32 page = 1; int32 limit = 2; }
message ListOrdersRes { repeated Order orders = 1; int32 total = 2; }

message UpdateStatusReq { string id = 1; string status = 2; }
message UpdateStatusRes { Order order = 1; }

message Order {
  string id = 1;
  string user_id = 2;
  string status = 3;
  double total_amount = 4;
  repeated OrderItemDetail items = 5;
}
message OrderItemDetail {
  string product_id = 1;
  int32 quantity = 2;
  double price_at_order = 3;
}